<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7d9cd8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8b8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd45f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="platformGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b8dd8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5570c0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad2)"/>
  
  <!-- Cloud left -->
  <ellipse cx="280" cy="80" rx="45" ry="25" fill="#f0f8ff" opacity="0.9"/>
  <ellipse cx="260" cy="90" rx="30" ry="20" fill="#f0f8ff" opacity="0.9"/>
  <ellipse cx="300" cy="90" rx="28" ry="18" fill="#f0f8ff" opacity="0.9"/>
  
  <!-- Cloud right -->
  <ellipse cx="400" cy="100" rx="35" ry="20" fill="#f0f8ff" opacity="0.8"/>
  <ellipse cx="385" cy="108" rx="22" ry="15" fill="#f0f8ff" opacity="0.8"/>
  <ellipse cx="415" cy="108" rx="20" ry="13" fill="#f0f8ff" opacity="0.8"/>
  
  <!-- Server racks -->
  <g transform="translate(360,250)">
    <rect x="0" y="0" width="60" height="80" rx="4" fill="#4a5fa0" stroke="#3d4d88" stroke-width="2"/>
    <rect x="5" y="5" width="50" height="15" rx="2" fill="#5570c0"/>
    <rect x="5" y="25" width="50" height="15" rx="2" fill="#5570c0"/>
    <rect x="5" y="45" width="50" height="15" rx="2" fill="#5570c0"/>
    <circle cx="12" cy="12" r="2" fill="#4dc3ff"/>
    <circle cx="12" cy="32" r="2" fill="#4dc3ff"/>
    <circle cx="12" cy="52" r="2" fill="#4dc3ff"/>
  </g>
  
  <g transform="translate(430,260)">
    <rect x="0" y="0" width="50" height="70" rx="4" fill="#4a5fa0" stroke="#3d4d88" stroke-width="2"/>
    <rect x="4" y="4" width="42" height="12" rx="2" fill="#5570c0"/>
    <rect x="4" y="20" width="42" height="12" rx="2" fill="#5570c0"/>
    <rect x="4" y="36" width="42" height="12" rx="2" fill="#5570c0"/>
    <circle cx="10" cy="10" r="1.5" fill="#4dc3ff"/>
    <circle cx="10" cy="26" r="1.5" fill="#4dc3ff"/>
    <circle cx="10" cy="42" r="1.5" fill="#4dc3ff"/>
  </g>
  
  <!-- Main Platform (phone/tablet) -->
  <rect x="100" y="200" width="220" height="140" rx="12" fill="url(#platformGrad)" stroke="#3d4d88" stroke-width="3"/>
  <rect x="110" y="210" width="200" height="120" rx="8" fill="#f0f8ff"/>
  
  <!-- Coins on platform -->
  <circle cx="145" cy="245" r="18" fill="url(#coinGrad)" stroke="#d6a626" stroke-width="2"/>
  <text x="145" y="252" font-family="Arial" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">₿</text>
  
  <circle cx="210" cy="245" r="18" fill="url(#coinGrad)" stroke="#d6a626" stroke-width="2"/>
  <text x="210" y="252" font-family="Arial" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">₿</text>
  
  <circle cx="275" cy="245" r="18" fill="url(#coinGrad)" stroke="#d6a626" stroke-width="2"/>
  <text x="275" y="252" font-family="Arial" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">₿</text>
  
  <!-- Chart bars -->
  <rect x="120" y="300" width="15" height="20" fill="#5570c0" opacity="0.7"/>
  <rect x="140" y="290" width="15" height="30" fill="#5570c0" opacity="0.8"/>
  <rect x="160" y="280" width="15" height="40" fill="#5570c0" opacity="0.9"/>
  <rect x="180" y="285" width="15" height="35" fill="#5570c0" opacity="0.8"/>
  <rect x="200" y="295" width="15" height="25" fill="#5570c0" opacity="0.7"/>
  
  <!-- Chart line -->
  <polyline points="230,310 250,295 270,305 290,290" stroke="#4dc3ff" stroke-width="3" fill="none" opacity="0.8"/>
  <circle cx="230" cy="310" r="3" fill="#4dc3ff"/>
  <circle cx="250" cy="295" r="3" fill="#4dc3ff"/>
  <circle cx="270" cy="305" r="3" fill="#4dc3ff"/>
  <circle cx="290" cy="290" r="3" fill="#4dc3ff"/>
  
  <!-- People -->
  <!-- Left person -->
  <g transform="translate(60,240)">
    <circle cx="0" cy="0" r="12" fill="#8b7bc8"/>
    <rect x="-8" y="13" width="16" height="25" rx="3" fill="#6b5bb8"/>
    <rect x="-15" y="18" width="10" height="15" rx="2" fill="#8b7bc8"/>
    <rect x="5" y="18" width="10" height="15" rx="2" fill="#8b7bc8"/>
    <path d="M -5,45 L -5,60 M 5,45 L 5,60" stroke="#6b5bb8" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- Right person at desk -->
  <g transform="translate(340,300)">
    <circle cx="0" cy="-10" r="10" fill="#d89cb8"/>
    <rect x="-7" y="0" width="14" height="20" rx="3" fill="#c87ba8"/>
    <rect x="-12" y="5" width="8" height="12" rx="2" fill="#d89cb8"/>
    <rect x="4" y="5" width="8" height="12" rx="2" fill="#d89cb8"/>
  </g>
  
  <!-- Desk/console -->
  <rect x="320" y="320" width="50" height="25" rx="3" fill="#5570c0" opacity="0.8"/>
  <rect x="325" y="315" width="18" height="12" rx="2" fill="#4dc3ff"/>
  
  <!-- Floating coin with arrow -->
  <g transform="translate(420,240)">
    <circle cx="0" cy="0" r="16" fill="url(#coinGrad)" stroke="#d6a626" stroke-width="2"/>
    <text x="0" y="6" font-family="Arial" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">₿</text>
    <path d="M 20,0 L 45,0 L 40,-5 M 45,0 L 40,5" stroke="#ffd45f" stroke-width="2.5" fill="none"/>
  </g>
  
  <!-- Pie chart -->
  <g transform="translate(90,370)">
    <circle cx="0" cy="0" r="25" fill="#5570c0" opacity="0.3"/>
    <path d="M 0,0 L 0,-25 A 25,25 0 0,1 22,-11 Z" fill="#4dc3ff" opacity="0.8"/>
    <path d="M 0,0 L 22,-11 A 25,25 0 0,1 15,20 Z" fill="#ffd45f" opacity="0.8"/>
  </g>
  
  <!-- Floating coins on ground -->
  <circle cx="120" cy="420" r="12" fill="url(#coinGrad)" stroke="#d6a626" stroke-width="1.5"/>
  <text x="120" y="425" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">₿</text>
  
  <circle cx="170" cy="410" r="12" fill="url(#coinGrad)" stroke="#d6a626" stroke-width="1.5"/>
  <text x="170" y="415" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">₿</text>
  
  <!-- Speech bubble -->
  <rect x="365" y="200" width="80" height="35" rx="8" fill="#fff" opacity="0.9"/>
  <polygon points="390,235 395,245 400,235" fill="#fff" opacity="0.9"/>
  <text x="405" y="215" font-family="Arial" font-size="11" fill="#5570c0" text-anchor="middle">Trading</text>
  <text x="405" y="228" font-family="Arial" font-size="11" fill="#5570c0" text-anchor="middle">Active</text>
</svg>
